name = "gts-comment-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Load embed script as text
[[rules]]
type = "Text"
globs = ["**/*.js"]
fallthrough = false

[vars]
ALLOWED_ORIGINS = "https://l3on.site,https://lok.bearblog.dev"
CACHE_TTL = "300"

# For local dev, create .dev.vars file with:
# GTS_INSTANCE_URL=https://rex.cat
# GTS_ACCESS_TOKEN=your_token
#
# For production, set these via Cloudflare dashboard or:
# wrangler secret put GTS_ACCESS_TOKEN
